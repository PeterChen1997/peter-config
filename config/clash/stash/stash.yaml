    interval: 86400

rules:
  # 本地 / 局域网
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT

  # 广告（家里由 AdGuard Home 负责，这条主要覆盖蜂窝网络场景）
  - GEOSITE,category-ads-all,REJECT

  # 自定义直连（含 Apple、国内 CDN、代理节点端点）
  - RULE-SET,peter-direct,DIRECT

  # AI / 风控敏感 → 美国静态住宅（先于媒体规则，防止 Google 系 AI 域名被媒体规则误伤）
  - RULE-SET,peter-ai,AI 专线
  - RULE-SET,bm7-openai,AI 专线
  - RULE-SET,bm7-claude,AI 专线
  - RULE-SET,bm7-gemini,AI 专线

  # 杂项强制代理（开发 / 设计 / 支付工具）→ 住宅
  # 须先于媒体规则：cursor 等开发工具会被媒体规则集误伤
  - RULE-SET,peter-proxy,AI 专线

  # 流量大户 → 便宜出口
  - RULE-SET,bm7-youtube,大流量
  - RULE-SET,bm7-netflix,大流量
  - RULE-SET,bm7-tiktok,大流量
  - RULE-SET,bm7-spotify,大流量
  - RULE-SET,bm7-twitter,大流量
  - RULE-SET,bm7-instagram,大流量
  - RULE-SET,bm7-telegram,大流量
  - RULE-SET,bm7-speedtest,大流量
  - RULE-SET,peter-heavy,大流量

  # 国内直连
  - GEOSITE,CN,DIRECT
  - GEOIP,CN,DIRECT

  # 兜底：默认住宅，质量优先
  - MATCH,国外兜底
